linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - revive
    - nilerr
    - noctx
    - contextcheck
    - errorlint
    - gocritic
    - gosec

linters-settings:
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: unexported-naming
      - name: errorf
      - name: exported

issues:
  exclude-rules:
    # Disable doc comment requirements for stub/generated code
    - path: _test\.go
      linters:
        - revive
    - linters:
        - revive
      text: "exported.*should have comment" 
    - linters:
        - revive
      text: "should have a package comment"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - .github
