name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}/saia

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ github.workspace }}/saia

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" -o dist/saiad-linux-amd64 ./cmd/saiad
          CGO_ENABLED=0 go build -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" -o dist/saia-linux-amd64 ./cmd/saia

      - name: Build Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          CGO_ENABLED=0 go build -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" -o dist/saiad-linux-arm64 ./cmd/saiad
          CGO_ENABLED=0 go build -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" -o dist/saia-linux-arm64 ./cmd/saia

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push Docker (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/saia
          push: true
          tags: |
            saia/saia:${{ steps.version.outputs.VERSION }}
            saia/saia:latest
            ghcr.io/tylerdotai/saia:${{ steps.version.outputs.VERSION }}
            ghcr.io/tylerdotai/saia:latest
          platforms: linux/amd64,linux/arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
