name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Format
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint
        run: |
          cd ${{ github.workspace }}
          golangci-lint run ./...

      - name: Tidy
        run: |
          cd ${{ github.workspace }}
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: |
          cd ${{ github.workspace }}
          go build ./...

      - name: Test + Race
        run: |
          cd ${{ github.workspace }}
          go test ./... -race -count=1

      - name: Coverage
        run: |
          cd ${{ github.workspace }}
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | grep total
          # Coverage gate: 0% for Phase 1 (stub code), raise to 70% when tests exist
          MIN_COVERAGE=0
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//' | cut -d'.' -f1)
          if [ "$COVERAGE" -lt "$MIN_COVERAGE" ]; then
            echo "Coverage $COVERAGE% is below minimum $MIN_COVERAGE%"
            exit 1
          fi
